{% extends 'index.html' %}
{% block content %}

<style>
.content {
    margin-left: 140px;
    padding: 20px;
    background: #f4f4f4;
    font-family: Arial, sans-serif;
    transition: 0.3s;
}
.content.collapsed { margin-left: 70px; }

/* Two-column layout */
.row-cols {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}
.row-cols .col-half {
    flex: 1 1 calc(50% - 10px);
    min-width: 200px;
}

/* Form styling */
.form-label { font-weight: 600; color: #374151; }
.form-control, .form-select {
    border-radius: 8px;
    border: 1px solid #d1d5db;
    height: 45px;
    padding: 8px 12px;
    width: 100%;
    box-sizing: border-box;
    transition: all 0.2s;
}
.form-control:focus, .form-select:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
}
textarea.form-control { min-height: 80px; resize: vertical; }

.btn-submit {
    background-color: #9c0b19;
    color: #fff;
    font-weight: 600;
    border-radius: 8px;
    padding: 12px 0;
    font-size: 16px;
    width: 100%;
    margin-top: 10px;
    transition: background-color 0.2s;
}
.btn-submit:hover { background-color: #4338ca; }

.mb-3 { margin-bottom: 15px !important; }

#amount-wrapper { display: none; }
</style>

<div class="content">
    <h1 class="dashboard-title">Add New Document</h1>
    <p class="greeting-text">Welcome to Admin Portal Dashboard</p>

    <form method="POST" action="{{ url_for('main.add_document') }}">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" required placeholder="Enter document title">
        </div>

        <div class="row-cols">
            <div class="col-half mb-3">
                <label for="doc_type" class="form-label">Document Type</label>
                <select class="form-select" id="doc_type" name="doc_type" required>
                    <option value="" selected disabled>Select Type</option>
                    {% for dt in document_type %}
                        <option value="{{ dt.name }}">{{ dt.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-half mb-3" id="amount-wrapper">
                <label for="amount" class="form-label">Amount (Optional)</label>
                <input type="number" class="form-control" id="amount" name="amount" placeholder="0.00">
            </div>

            <div class="col-half mb-3">
                <label class="form-label">Implementing Office</label>
                <input type="text" class="form-control" value="{{ current_user.department }}" readonly>
                <input type="hidden" name="implementing_office" value="{{ current_user.department }}">
            </div>

            <div class="col-half mb-3">
                <label for="released_by" class="form-label">Released By</label>
                <input type="text" class="form-control" value="{{ current_user.full_name }}" readonly>
                <input type="hidden" name="released_by" value="{{ current_user.full_name }}">
            </div>
        </div>

        <div class="row-cols">
            <div class="col-half mb-3">
                <label for="received_by" class="form-label">Received By</label>
                <select class="form-select" id="received_by" name="received_by" required>
                    <option value="" selected disabled>Select Employee</option>
                    {% for user in users %}
                        {% if user.role != "Admin" %}
                            <option value="{{ user.full_name }}">{{ user.full_name }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="col-half mb-3">
                <label for="date_received" class="form-label">Date Received</label>
                <input type="date" class="form-control" id="date_received" name="date_received" required>
            </div>

            <div class="col-half mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status" required>
                    <option value="" selected disabled>Select Status</option>
                    {% for stat in document_status %}
                        <option value="{{ stat.name }}">{{ stat.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">Add Document</button>
    </form>
</div>

<script>
const monetaryTypes = ["SVP","Bidding","Reimbursement of Diesel","Reimbursement of Tarpaulin","Burial Assistance","T.E.V"];
const statusMap = {
    "Bidding": ["For Signature Mayor","Request for PR","Request for PO","Request for OBR","For Signature BAC Members - BAC Office","For Accounting Staff Validation","For Processing","With Checked"],
    "SVP": ["Pending Approval","Processing","Completed"],
    "Reimbursement of Diesel": ["Pending","Approved","Paid"],
    "Reimbursement of Tarpaulin": ["Pending","Approved","Paid"],
    "Burial Assistance": ["Pending","Approved","Paid"],
    "T.E.V": ["Pending","Approved","Paid"],
    "Other": ["Pending","Processing","Completed"]
};

const docTypeSelect = document.getElementById('doc_type');
const amountWrapper = document.getElementById('amount-wrapper');
const amountInput = document.getElementById('amount');
const statusSelect = document.getElementById('status');

// Show/hide amount and update statuses
docTypeSelect.addEventListener('change', () => {
    const selectedType = docTypeSelect.value;

    // Amount field
    if(monetaryTypes.includes(selectedType)) {
        amountWrapper.style.display = 'block';
    } else {
        amountWrapper.style.display = 'none';
        amountInput.value = '';
    }

    // Status dropdown
    statusSelect.innerHTML = '<option value="" selected disabled>Select Status</option>';
    const statuses = statusMap[selectedType] || statusMap["Other"];
    statuses.forEach(st => {
        const opt = document.createElement('option');
        opt.value = st;
        opt.textContent = st;
        statusSelect.appendChild(opt);
    });
});

// Auto-fill Date Received with today
document.addEventListener('DOMContentLoaded', () => {
    const dateInput = document.getElementById('date_received');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
});
</script>

{% endblock %}
