{% extends 'index.html' %}
{% block content %}
<div class="content">
  <div class="d-flex justify-content-between align-items-center mb-3" style="border-bottom:1px solid #EDE8E0;padding-bottom:12px;">
    <div>
      <h1 class="dashboard-title">Create New Document</h1>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">Complete all required fields to create a new document record.</div>
    </div>
  </div>
  <div class="gov-card">
    <div class="gov-card-header">
      <div class="ci"><i class="fa-solid fa-file-circle-plus"></i></div>
      <h3>Document Information</h3>
    </div>
    <form method="POST" action="{{ url_for('main.add_document') }}">
      <div class="row g-3">

        <div class="col-12">
          <label class="form-label">Document Title <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="title" required placeholder="Enter full document title">
        </div>

        <div class="col-md-6">
          <label class="form-label">Document Type <span class="text-danger">*</span></label>
          <select class="form-select" name="doc_type" required>
            <option value="" selected disabled>Select type...</option>
            {% for dt in document_type %}
            <option value="{{ dt.name }}">{{ dt.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Action to be Taken <span class="text-danger">*</span></label>
          <select class="form-select" name="action_taken" required>
            <option value="" selected disabled>Select action...</option>
            <option value="For Appropriate Action">For Appropriate Action</option>
            <option value="For Follow Up">For Follow Up</option>
            <option value="For Signature">For Signature</option>
            <option value="For Information">For Information</option>
            <option value="For Compliance">For Compliance</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Details <span class="text-muted fw-normal" style="font-size:11px;">(optional)</span></label>
          <textarea class="form-control" name="remarks" rows="3" placeholder="Additional notes or instructions..."></textarea>
        </div>

      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn-gov"><i class="fa fa-plus me-1"></i>Create Document</button>
        <a href="{{ url_for('main.documents') }}" class="btn-gov-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
