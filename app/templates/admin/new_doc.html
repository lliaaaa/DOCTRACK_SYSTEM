{% extends 'index.html' %}
{% block content %}
<div class="content">
  <div class="d-flex justify-content-between align-items-center mb-3" style="border-bottom:1px solid #EDE8E0;padding-bottom:12px;">
    <div>
      <h1 class="dashboard-title">Register New Document</h1>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">Complete all required fields to create a new document record.</div>
    </div>
  </div>
  <div class="row justify-content-center">
    <div class="col-lg-7">
    <div class="gov-card">
      <div class="gov-card-header">
        <div class="ci"><i class="fa-solid fa-file-circle-plus"></i></div>
        <h3>Document Information</h3>
      </div>
      <form method="POST" action="{{ url_for('main.add_document') }}">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Document Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="title" required placeholder="Enter full document title">
          </div>
          <div class="col-md-6">
            <label class="form-label">Document Type <span class="text-danger">*</span></label>
            <select class="form-select" name="doc_type" id="docTypeSelect" required>
              <option value="" selected disabled>Select type...</option>
              {% for dt in document_type %}
              <option value="{{ dt.name }}">{{ dt.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6" id="amountWrap" style="display:none;">
            <label class="form-label">Amount (₱)</label>
            <input type="number" class="form-control" name="amount" id="amountInput" placeholder="0.00" step="0.01" min="0">
          </div>
          <div class="col-md-6">
            <label class="form-label">Priority Level <span class="text-danger">*</span></label>
            <select class="form-select" name="priority" required>
              <option value="Normal" selected>🟢 Normal</option>
              <option value="Urgent">🔴 Urgent</option>
              <option value="Routine">🟠 Routine</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Implementing Office</label>
            <input type="text" class="form-control" value="{{ current_user.department }}" readonly>
            <input type="hidden" name="implementing_office" value="{{ current_user.department }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Released By</label>
            <input type="text" class="form-control" value="{{ current_user.full_name }}" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">Received By <span class="text-danger">*</span></label>
            <select class="form-select" name="received_by" required>
              <option value="" disabled selected>Select staff member...</option>
              {% for user in users %}
                {% if user.id == current_user.id %}
                  {# Admin shown once with (you) label #}
                  <option value="{{ user.full_name }}" selected>{{ user.full_name }} (you)</option>
                {% else %}
                  <option value="{{ user.full_name }}">{{ user.full_name }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Remarks <span class="text-muted fw-normal" style="font-size:11px;">(optional)</span></label>
            <textarea class="form-control" name="remarks" rows="2" placeholder="Additional notes or instructions..."></textarea>
          </div>
          <div class="col-12" style="background:#FEF9EC;border:1px solid #F5D86A;border-radius:6px;padding:10px 12px;font-size:12px;color:#7A5700;">
            <i class="fa-solid fa-circle-info me-1"></i>
            Date In is set automatically when the document is created.
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn-gov"><i class="fa fa-plus me-1"></i>Register Document</button>
          <a href="{{ url_for('main.documents') }}" class="btn-gov-outline">Cancel</a>
        </div>
      </form>
    </div>
    </div>
  </div>
</div>
<script>
const monetaryTypes = ["SVP","Bidding","Reimbursement of Diesel","Reimbursement of Tarpaulin","Burial Assistance","T.E.V","Purchase Request"];
document.getElementById('docTypeSelect').addEventListener('change', function() {
  const wrap = document.getElementById('amountWrap');
  wrap.style.display = monetaryTypes.includes(this.value) ? 'block' : 'none';
  if (!monetaryTypes.includes(this.value)) document.getElementById('amountInput').value = '';
});
</script>
{% endblock %}
