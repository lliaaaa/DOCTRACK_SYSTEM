{% extends 'base.html' %}
{% block content %}

<h2>Edit Record</h2>

<form method="POST">

    <div class="mb-3">
        <label>Control</label>
        <input type="text" name="control" class="form-control" value="{{ record.control }}" required>
    </div>

    <div class="mb-3">
        <label>Department</label>
        <input type="text" name="department" class="form-control" value="{{ record.department }}" required>
    </div>

    <div class="mb-3">
        <label>Type</label>
        <input type="text" name="type" class="form-control" value="{{ record.type }}" required>
    </div>

    <div class="mb-3">
        <label>Amount</label>
        <input type="number" name="amount" class="form-control" value="{{ record.amount }}" required>
    </div>

    <div class="mb-3">
        <label>Payee</label>
        <input type="text" name="payee" class="form-control" value="{{ record.payee }}" required>
    </div>

    <div class="mb-3">
        <label>Source</label>
        <input type="text" name="source" class="form-control" value="{{ record.source }}">
    </div>

    <div class="mb-3">
        <label>Date In</label>
        <input type="date" name="date_in" class="form-control" value="{{ record.date_in }}">
    </div>

    <div class="mb-3">
        <label>Clock In</label>
        <input type="time" name="clock_in" class="form-control" value="{{ record.clock_in }}">
    </div>

    <div class="mb-3">
        <label>Date Returned</label>
        <input type="date" name="date_returned" class="form-control" value="{{ record.date_returned }}">
    </div>

    <div class="mb-3">
        <label>Clock Out</label>
        <input type="time" name="clock_out" class="form-control" value="{{ record.clock_out }}">
    </div>

    <div class="mb-3">
        <label>Status</label>
        <input type="text" name="status" class="form-control" value="{{ record.status }}">
    </div>

    <div class="mb-3">
        <label>Remarks</label>
        <textarea name="remarks" class="form-control">{{ record.remarks }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">Update Record</button>
</form>

{% endblock %}
