<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document Tracking</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: Arial, sans-serif; margin:0; background:#f4f4f4; }
    .page-header { padding:18px 20px; background:white; border-bottom:1px solid #e6e6e6; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; }
    .controls input, .controls select { padding:8px 10px; border:1px solid #ddd; border-radius:6px; }
    .card { background:white; padding:20px; margin:16px 20px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .timeline { display:flex; flex-direction:column; gap:12px; position:relative; margin-top:20px; }
    .timeline::before { content:""; position:absolute; left:20px; top:0; bottom:0; width:3px; background:#ccc; border-radius:2px; }
    .timeline-step { padding:10px 20px 10px 50px; background:#f9f9f9; border-radius:6px; position:relative; }
    .timeline-step::before { content:""; position:absolute; left:11px; top:12px; width:18px; height:18px; border-radius:50%; background:#ccc; }
    .timeline-step.toreview { border-left:3px solid #6c757d; } /* gray */
    .timeline-step.toreview::before { background:#6c757d; }
    .timeline-step.processing { border-left:3px solid #17a2b8; } /* teal */
    .timeline-step.processing::before { background:#17a2b8; }
    .timeline-step.forapproval { border-left:3px solid #0d6efd; } /* blue */
    .timeline-step.forapproval::before { background:#0d6efd; }
    .timeline-step.completed { border-left:3px solid #198754; } /* green */
    .timeline-step.completed::before { background:#198754; }
    .timeline-step h4 { margin:0 0 4px 0; font-size:16px; }
    .timeline-step p { margin:2px 0; font-size:14px; color:#555; }
    .small { font-size:13px; color:#666; }
</style>
</head>
<body>

<div class="page-header">
    <div>
        <h2 style="margin:0 0 6px 0">Document Tracking</h2>
        <div class="small">Select a document to view its status timeline</div>
    </div>

    <div class="controls">
        <input id="searchInput" type="search" placeholder="Search by ID or title..." oninput="renderTimeline()" />
        <select id="selectDoc" onchange="renderTimeline()">
            <option value="">Select document</option>
        </select>
    </div>
</div>

<div class="card">
    <div id="timelineContainer">
        <p class="small">Timeline will appear here after selecting a document.</p>
    </div>
</div>

<script>


// Populate select dropdown
const selectDoc = document.getElementById("selectDoc");
documents.forEach(doc=>{
    const option = document.createElement("option");
    option.value = doc.id;
    option.textContent = `${doc.id} - ${doc.title}`;
    selectDoc.appendChild(option);
});

function renderTimeline() {
    const container = document.getElementById("timelineContainer");
    const searchVal = document.getElementById("searchInput").value.toLowerCase();
    const selectedId = selectDoc.value;

    container.innerHTML = "";

    let doc;
    if(selectedId) {
        doc = documents.find(d=>d.id===selectedId);
    } else if(searchVal) {
        doc = documents.find(d=>(d.id.toLowerCase()+d.title.toLowerCase()).includes(searchVal));
    }

    if(!doc) {
        container.innerHTML = `<p class="small">No document selected or found.</p>`;
        return;
    }

    const timelineDiv = document.createElement("div");
    timelineDiv.className = "timeline";

    doc.timeline.forEach(step=>{
        const stepDiv = document.createElement("div");
        stepDiv.className = `timeline-step ${step.status.toLowerCase().replace(" ","")}`;
        stepDiv.innerHTML = `<h4>${step.status}</h4>
                             <p><strong>Department:</strong> ${step.dept}</p>
                             <p><strong>Date:</strong> ${step.date}</p>
                             <p><strong>Remarks:</strong> ${step.remarks}</p>`;
        timelineDiv.appendChild(stepDiv);
    });

    container.appendChild(timelineDiv);
}
</script>

</body>
</html>
